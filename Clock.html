<!doctype html>
<html>
<head>
<title>Clock</title>
</head>
<body>
<h2>Just leave this tab open to always have a clock</h2>
<script>
setInterval(function(){d = new Date(); min = d.getMinutes()/100; min = min.toFixed(2); min += '.'; sec = d.getSeconds()/100;  sec = sec.toFixed(2); hr = d.getHours(); sec += '.'; if(hr > 12){hr -= 12;} t = hr + ':' + min.split('.')[1] + ':' + sec.split('.')[1]; if(d.getHours() >= 12){t += ' pm'}else{t += ' am';} document.title = t; }, 10);
</script>
</body>
</html>
